name: Github-CI
on:
  push:
    branches:
      - main

jobs:
  Setup:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18,19,20]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup node
        uses: actions/setup-node@v1
        with:
          node-version: ${{matrix.node-version}}

      - name: Test
        run: |
          npm install html-validator-cli
          npx html-validator --file=index.html

      - name: Security Scan
        uses: SonarSource/sonarqube-scan-action@v8.2.0
        with:
          args: >
            -Dsonar.projectKey=HP04Harsh_devsecops-pipeline
            -Dsonar.organization=hp04harsh
        env:
          SONAR_TOKEN: ${{secrets.SONAR_TOKEN}}
          SONAR_HOST_URL: https://sonarcloud.io

      - name: Quality Gate
        uses: sonarsource/sonarqube-quality-gate-action@v1.2.0
        with:
          pollingTimeoutSec: 600
        env:
          SONAR_TOKEN: ${{secrets.SONAR_TOKEN}}      

      - name: Download and login Docker
        uses: docker/login-action@v3
        with:
          username: ${{secrets.USERNAME}}
          password: ${{secrets.PASSWORD}}

      - name: Build image and publish
        run: |
          docker build -t ${{secrets.USERNAME}}/mywebapp:v1 .
          docker push ${{secrets.USERNAME}}/mywebapp:v1



